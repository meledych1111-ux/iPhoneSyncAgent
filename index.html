<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>iPhoneSync</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui; background: #f5f5f5; padding: 20px; padding-bottom: 50px; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #2196F3; font-size: 28px; }
        .status { padding: 12px; border-radius: 10px; font-size: 14px; margin-top: 10px; text-align: center; font-weight: 600; }
        .online { background: #e8f5e9; color: #2e7d32; }
        .offline { background: #ffebee; color: #c62828; }
        .ip-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; text-align: center; margin-bottom: 10px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-blue { background: #2196F3; color: white; margin-bottom: 10px; }
        .btn-green { background: #4CAF50; color: white; margin-top: 10px; }
        .file-list { margin-top: 10px; background: white; border-radius: 12px; overflow: hidden; }
        .file-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 14px; }
        .progress { height: 20px; background: #eee; border-radius: 10px; margin-top: 15px; display: none; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #4CAF50; transition: 0.3s; }
        .warning { color: #d32f2f; font-size: 12px; margin-top: 10px; display: none; text-align: center; padding: 5px; border: 1px dashed #d32f2f; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="header"><h1>📱 iPhoneSync</h1><p>Передача файлов на ПК</p></div>

    <div class="card">
        <input type="text" id="pcIp" class="ip-input" placeholder="Введите IP (например 192.168.1.50)">
        <button id="checkBtn" class="btn-blue">🔍 Проверить связь</button>
        <div id="pcStatus" class="status offline">🔴 Не подключен</div>
        <div id="httpsWarning" class="warning">⚠️ Вы используете HTTPS. Локальная сеть будет заблокирована. Используйте http://</div>
    </div>

    <div class="card">
        <button id="selectFilesBtn" class="btn-blue">📁 Выбрать файлы (Любые)</button>
        <input type="file" id="fileInput" multiple style="display: none;">
        <div id="fileList" class="file-list"></div>
        <button id="sendBtn" class="btn-green" style="display: none;">📤 Отправить на компьютер</button>
        <div class="progress" id="progress"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <script>
        const PORT = 15000;
        let selectedFiles = [];
        let isOnline = false;

        const pcIpInput = document.getElementById('pcIp');
        const pcStatus = document.getElementById('pcStatus');
        const fileList = document.getElementById('fileList');
        const sendBtn = document.getElementById('sendBtn');
        const progressBar = document.getElementById('progressBar');
        const progressDiv = document.getElementById('progress');

        // Авто-заполнение IP
        pcIpInput.value = localStorage.getItem('pcIp') || '';
        if (window.location.protocol === 'https:') document.getElementById('httpsWarning').style.display = 'block';

        document.getElementById('checkBtn').onclick = checkConnection;
        document.getElementById('selectFilesBtn').onclick = () => document.getElementById('fileInput').click();
        
        document.getElementById('fileInput').onchange = (e) => {
            selectedFiles = Array.from(e.target.files);
            renderFiles();
        };

        function renderFiles() {
            fileList.innerHTML = selectedFiles.map(f => `<div class="file-item"><span>${f.name}</span><span>${(f.size/1024/1024).toFixed(2)} MB</span></div>`).join('');
            sendBtn.style.display = selectedFiles.length > 0 ? 'block' : 'none';
        }

        async function checkConnection() {
            const ip = pcIpInput.value.trim();
            if (!ip) return alert('Введите IP!');
            localStorage.setItem('pcIp', ip);
            pcStatus.innerHTML = '🔄 Проверка...';
            
            try {
                const res = await fetch(`http://${ip}:${PORT}/status`, { mode: 'cors' });
                if (res.ok) {
                    pcStatus.innerHTML = '✅ Связь установлена!';
                    pcStatus.className = 'status online';
                    isOnline = true;
                } else throw new Error();
            } catch (e) {
                pcStatus.innerHTML = '❌ ПК не отвечает';
                pcStatus.className = 'status offline';
                isOnline = false;
            }
        }

        async function sendFiles() {
            if (!isOnline) return alert('Сначала проверьте связь!');
            const ip = pcIpInput.value.trim();
            progressDiv.style.display = 'block';
            
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                const percent = ((i / selectedFiles.length) * 100);
                progressBar.style.width = percent + '%';

                try {
                    await fetch(`http://${ip}:${PORT}/upload`, {
                        method: 'POST',
                        mode: 'cors',
                        headers: {
                            'X-File-Name': encodeURIComponent(file.name),
                            'X-File-Size': file.size.toString()
                        },
                        body: file
                    });
                } catch (e) {
                    alert('Ошибка при передаче: ' + file.name);
                }
            }
            
            progressBar.style.width = '100%';
            setTimeout(() => {
                alert('🎉 Все файлы успешно отправлены!');
                progressDiv.style.display = 'none';
                selectedFiles = [];
                renderFiles();
            }, 500);
        }

        sendBtn.onclick = sendFiles;

        // Регистрация SW для PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
